[build]
  command   = "npm run build"
  publish   = "dist"
  functions = "netlify/functions"

[dev]
  framework  = "vite"
  targetPort = 3000     # must match vite.config.ts server.port

# Forward only the live-routes endpoint to its Netlify Function.
# Other /api/* routes (admin-data, git-status, deploy, etc.) are handled
# by the Vite dev server middleware and must NOT be caught here.
[[redirects]]
  from   = "/api/get-routes"
  to     = "/.netlify/functions/get-routes"
  status = 200

# SPA fallback — everything else serves index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
